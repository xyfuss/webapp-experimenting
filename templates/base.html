<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}My App{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5;
      display: flex; justify-content: center;
      padding: 60px 16px; }
    .auth-card { background: white; border-radius: 12px;
      padding: 36px 32px; width: 100%; max-width: 380px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    h1 { font-size: 22px; margin-bottom: 4px; }
    p  { color: #666; font-size: 14px; margin-bottom: 24px; }
    label { display: block; font-size: 13px; font-weight: 500;
      margin-bottom: 4px; color: #444; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 14px; margin-bottom: 16px; }
    button { width: 100%; padding: 11px; background: #111;
      color: white; border: none; border-radius: 8px;
      font-size: 15px; cursor: pointer; margin-top: 4px; }
    button:hover { background: #333; }
    .error { background: #fef2f2; color: #b91c1c;
      border-radius: 8px; padding: 10px 14px;
      font-size: 13px; margin-bottom: 16px; }
    a { color: #111; }
  </style>
</head>
<body>
  {% block content %}{% endblock %}
</body>
</html>
